button{

button.wrong{

button:disabled{

}
.explain{

  color:#fff;

.ad-area{

const quizData = [];
for(let i = 0; i < 4; i++){
  baseQuizData.forEach(item => {
    quizData.push({
      q:item.q,
      choices:[...item.choices],
      answer:item.answer,
      explain:item.explain
    });
  });
}

let questions = [];
let current = 0;
let score = 0;
let lock = false;

function shuffle(arr){
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startGame(){
  questions = shuffle([...quizData]).slice(0,50);
  current = 0;
  score = 0;
  lock = false;
  document.getElementById("restart").style.display = "none";
  showQuestion();
}

function showQuestion(){
  lock = false;
  const q = questions[current];

  document.getElementById("count").textContent = `${current + 1} / 50`;
  document.getElementById("score").textContent = `正解 ${score}`;
  document.getElementById("question").textContent = q.q;
  document.getElementById("result").innerHTML = "";

  const choicesEl = document.getElementById("choices");
  choicesEl.innerHTML = "";

  shuffle([...q.choices]).forEach(choice => {
    const btn = document.createElement("button");
    btn.textContent = choice;
    btn.onclick = () => checkAnswer(btn, choice);
    choicesEl.appendChild(btn);
  });
}

function checkAnswer(button, choice){
  if(lock) return;
  lock = true;

  const q = questions[current];
  const buttons = document.querySelectorAll("#choices button");

  buttons.forEach(btn => {
    btn.disabled = true;
    if(btn.textContent === q.answer){
      btn.classList.add("correct");
    }
  });

  if(choice === q.answer){
    score++;
    button.classList.add("correct");
    document.getElementById("result").innerHTML =
      `正解！<div class="explain">${q.explain}</div>`;
  }else{
    button.classList.add("wrong");
    document.getElementById("result").innerHTML =
      `不正解… 正解は「${q.answer}」<div class="explain">${q.explain}</div>`;
  }

  document.getElementById("score").textContent = `正解 ${score}`;

  setTimeout(() => {
    current++;
    if(current < questions.length){
      showQuestion();
    }else{
      finishGame();
    }
  }, 1700);
}

function finishGame(){
  document.getElementById("question").textContent =
    `50問終了！ ${score}問正解！`;

  document.getElementById("choices").innerHTML = "";

  let message = "";
  if(score >= 45){
    message = "同い年雑学マスター！歴史の横並び感覚がすごい！";
  }else if(score >= 30){
    message = "かなり詳しい！意外な同世代をよく見抜けています！";
  }else{
    message = "もう一度挑戦して、意外な同い年コンビを覚えよう！";
  }

  document.getElementById("result").innerHTML = message;
  document.getElementById("restart").style.display = "block";
}

function restartGame(){
  startGame();
}

startGame();
